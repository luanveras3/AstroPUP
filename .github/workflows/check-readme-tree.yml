name: Check README Repository Tree

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-readme-tree:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate README repository tree
        run: |
          python tools/update_readme_tree.py

      - name: Check if README tree is up to date
        run: |
          git diff --exit-code README.md
